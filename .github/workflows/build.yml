name: Build touch_inject_hidden Kernel Module

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/sphinx /etc/php /usr/lib/jvm
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses-dev lib32ncurses-dev x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            python3 python-is-python3

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android14-6.1

      - name: Sync kernel source (android14-6.1)
        run: |
          mkdir -p aosp-kernel && cd aosp-kernel
          git config --global user.name "CI Builder"
          git config --global user.email "ci@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android14-6.1 --depth=1
          repo sync -c --no-tags --no-clone-bundle -j$(nproc) --force-sync

      - name: Build kernel + modules_prepare (Bazel)
        run: |
          cd aosp-kernel
          tools/bazel build //common:kernel_aarch64 //common:kernel_aarch64_modules_prepare

      - name: Extract modules_prepare
        run: |
          cd aosp-kernel
          BAZEL_OUT=$(readlink -f bazel-bin/common/kernel_aarch64)
          cd "$BAZEL_OUT"
          tar -xzf ../kernel_aarch64_modules_prepare/modules_prepare_outdir.tar.gz

      - name: Build touch_inject_hidden.ko
        run: |
          cd aosp-kernel
          BAZEL_OUT=$(readlink -f bazel-bin/common/kernel_aarch64)
          TOOLCHAIN=$(find prebuilts/clang/host/linux-x86 -maxdepth 1 -name "clang-*" | head -1)
          CROSS_PREFIX=$(find prebuilts -path "*/linux-x86_64/bin/aarch64-linux-android-*" -name "aarch64-linux-android-*" | head -1 | sed 's/-gcc$//' | sed 's/-ld$//')

          make -C common \
            O="$BAZEL_OUT" \
            M="$GITHUB_WORKSPACE/touch_inject_hidden/kernel" \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM_TOOLCHAIN_PATH="$TOOLCHAIN" \
            modules -j$(nproc)

      - name: Upload .ko artifact
        uses: actions/upload-artifact@v4
        with:
          name: touch_inject_hidden.ko
          path: kernel/touch_inject_hidden.ko
