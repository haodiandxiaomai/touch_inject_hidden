name: Build touch_inject_hidden Kernel Module

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment (free disk space)
        run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/sphinx /etc/php /usr/lib/jvm
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            python3 python-is-python3 repo

      - name: Initialize repo and sync kernel source (android14-6.1)
        run: |
          mkdir -p aosp-kernel && cd aosp-kernel
          git config --global user.name "CI Builder"
          git config --global user.email "ci@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Build kernel + modules_prepare
        run: |
          cd aosp-kernel
          build/build.sh -j$(nproc) modules_prepare

      - name: Extract modules_prepare artifacts
        run: |
          cd aosp-kernel
          # modules_prepare 输出通常在 out/ 目录
          ls out/

      - name: Copy touch_inject_hidden source
        run: |
          cp -r touch_inject_hidden/kernel aosp-kernel/touch_inject_hidden_kernel

      - name: Build kernel module
        run: |
          cd aosp-kernel
          make M=touch_inject_hidden_kernel modules

      - name: Upload .ko artifact
        uses: actions/upload-artifact@v4
        with:
          name: touch_inject_hidden.ko
          path: aosp-kernel/touch_inject_hidden_kernel/touch_inject_hidden.ko
