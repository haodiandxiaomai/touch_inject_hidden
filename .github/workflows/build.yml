name: Build touch_inject_hidden

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KERNEL_ROOT: ${{ github.workspace }}/aosp-kernel
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 清理磁盘空间
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 安装依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves
          execute_install_scripts: true

      - name: 配置 ccache
        run: |
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: android14-6.1-128-ccache-${{ github.sha }}
          restore-keys: |
            android14-6.1-128-ccache-

      - name: 缓存工具链
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      - name: 下载工具链
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          AOSP=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      - name: 配置 Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "build@ci.local"

      - name: 初始化 repo 同步内核源码 (android14-6.1-2025-03)
        run: |
          mkdir -p $KERNEL_ROOT
          cd $KERNEL_ROOT
          mkdir -p git-repo
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o git-repo/repo
          chmod +x git-repo/repo
          echo "$KERNEL_ROOT/git-repo" >> $GITHUB_PATH
          REPO="$KERNEL_ROOT/git-repo/repo"

          FORMATTED_BRANCH="android14-6.1-2025-03"
          $REPO init --depth=1             -u https://android.googlesource.com/kernel/manifest             -b common-${FORMATTED_BRANCH}             --repo-rev=v2.16

          # 检测 deprecated 分支（GKI 项目的做法）
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST=.repo/manifests/default.xml
          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "检测到已弃用的分支: ${FORMATTED_BRANCH}"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST
          fi

          # 带重试的 repo sync
          for i in 1 2 3; do
            echo "repo sync 尝试 $i/3..."
            $REPO --trace sync -c -j$(nproc) --no-tags && break
            echo "第 $i 次同步失败，10 秒后重试..."
            sleep 10
          done

          # 验证关键文件存在
          ls -la common/build.config.gki* 2>/dev/null || echo "WARNING: build.config not found"
          ls -la build/build.sh 2>/dev/null || echo "WARNING: build.sh not found"
          ls -la common/Makefile 2>/dev/null || echo "WARNING: Makefile not found"
          echo "=== 同步完成，目录内容 ==="
          ls -la | head -20

      - name: 编译内核 (Bazel)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: timeout
          command: |
            cd $KERNEL_ROOT
            sed -i 's/check_defconfig//' ./common/build.config.gki
            tools/bazel build --disk_cache=$HOME/.cache/bazel               --config=fast --lto=thin               //common:kernel_aarch64 //common:kernel_aarch64_modules_prepare

      - name: 编译 touch_inject_hidden.ko
        run: |
          cd $KERNEL_ROOT
          BAZEL_OUT=$(readlink -f bazel-bin/common/kernel_aarch64)

          # 解压 modules_prepare
          if [ -f "$BAZEL_OUT/../kernel_aarch64_modules_prepare/modules_prepare_outdir.tar.gz" ]; then
            cd "$BAZEL_OUT"
            tar -xzf ../kernel_aarch64_modules_prepare/modules_prepare_outdir.tar.gz
            cd $KERNEL_ROOT
          fi

          # 安装 clang（bazel 的 clang 在 hermetic 缓存里不好找）
          sudo apt-get install -y clang lld
          clang --version

          make -C common O="$BAZEL_OUT" M="${{ github.workspace }}/kernel" ARCH=arm64 \
            CC="clang" CROSS_COMPILE="aarch64-linux-gnu-" \
            modules -j$(nproc)

      - name: 上传 .ko
        uses: actions/upload-artifact@v4
        with:
          name: touch_inject_hidden.ko
          path: touch_inject_hidden/kernel/touch_inject_hidden.ko
