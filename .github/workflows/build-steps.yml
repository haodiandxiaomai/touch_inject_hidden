name: Build step-by-step test modules
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FORMATTED_BRANCH: "android14-6.1-2025-03"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: project

      - name: Free disk
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Install deps
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves bc clang lld binutils-aarch64-linux-gnu
          execute_install_scripts: true

      - name: Download repo
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "~/bin" >> $GITHUB_PATH

      - name: Download tools
        run: |
          git clone https://android.googlesource.com/kernel/prebuilts/build-tools -b main-kernel-build-2024 --depth 1 kernel-build-tools
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg -b main-kernel-build-2024 --depth 1 mkbootimg

      - name: ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --max-size=2G
          ccache --set-config=compression=true

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: a14-6.1-128-ccache-v2
          restore-keys: |
            a14-6.1-128-ccache-

      - name: Git config
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "build@ci.local"

      - name: Sync kernel
        run: |
          FB="${{ env.FORMATTED_BRANCH }}"
          KR="$GITHUB_WORKSPACE/$FB"
          mkdir -p "$KR"
          cd "$KR"
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-$FB --repo-rev=v2.16
          RB=$(git ls-remote https://android.googlesource.com/kernel/common $FB 2>/dev/null || true)
          if echo "$RB" | grep -q deprecated 2>/dev/null; then
            sed -i "s/\"$FB\"/\"deprecated\/$FB\"/g" .repo/manifests/default.xml
          fi
          repo --trace sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)
          echo "KERNEL_ROOT=$KR" >> $GITHUB_ENV

      - name: Build kernel + modules_prepare
        run: |
          cd $KERNEL_ROOT
          tools/bazel build --disk_cache=$HOME/.cache/bazel --config=fast \
            //common:kernel_aarch64 //common:kernel_aarch64_modules_prepare || exit 1
          BAZEL_OUT=$(readlink -f bazel-bin/common/kernel_aarch64)
          cd $BAZEL_OUT
          tar -xzf ../kernel_aarch64_modules_prepare/modules_prepare_outdir.tar.gz
          echo "BAZEL_OUT=$BAZEL_OUT" >> $GITHUB_ENV

      - name: Build 4 test variants
        run: |
          KDIR="$KERNEL_ROOT/common"
          CLANG_DIR="$KERNEL_ROOT/prebuilts/clang/host/linux-x86/clang-r487747c"
          [ -x "$CLANG_DIR/bin/clang" ] || CLANG_DIR="/usr"
          SRC="$GITHUB_WORKSPACE/project/kernel"
          OUT="$GITHUB_WORKSPACE/project/output"
          mkdir -p "$OUT"

          for STEP in 1 2 3 4; do
            echo "=== Building TEST_STEP=$STEP ==="

            # 创建专用 Makefile
            echo "obj-m := test_step.o" > "$SRC/Makefile"
            echo "ccflags-y := -DTEST_STEP=$STEP -Wno-unused-function" >> "$SRC/Makefile"

            # 清理旧产物
            make -C "$KDIR" O="$BAZEL_OUT" M="$SRC" ARCH=arm64 clean 2>/dev/null || true

            # 编译
            env PATH="$CLANG_DIR/bin:$PATH" \
              make -C "$KDIR" O="$BAZEL_OUT" M="$SRC" \
                ARCH=arm64 LLVM=1 LLVM_IAS=1 \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                modules -j$(nproc)

            # 复制并重命名
            cp "$SRC/test_step.ko" "$OUT/test_step_${STEP}.ko"
            echo "test_step_${STEP}.ko: $(file $OUT/test_step_${STEP}.ko)"
          done

          ls -la "$OUT/"

      - name: Build 5 inj test variants
        run: |
          KDIR="$KERNEL_ROOT/common"
          CLANG_DIR="$KERNEL_ROOT/prebuilts/clang/host/linux-x86/clang-r487747c"
          [ -x "$CLANG_DIR/bin/clang" ] || CLANG_DIR="/usr"
          SRC="$GITHUB_WORKSPACE/project/kernel"
          OUT="$GITHUB_WORKSPACE/project/output"
          mkdir -p "$OUT"

          for STEP in 1 2 3 4 5; do
            echo "=== Building INJ_STEP=$STEP ==="

            echo "obj-m := test_inj_steps.o" > "$SRC/Makefile"
            echo "ccflags-y := -DINJ_STEP=$STEP -Wno-unused-function" >> "$SRC/Makefile"

            make -C "$KDIR" O="$BAZEL_OUT" M="$SRC" ARCH=arm64 clean 2>/dev/null || true

            env PATH="$CLANG_DIR/bin:$PATH" \
              make -C "$KDIR" O="$BAZEL_OUT" M="$SRC" \
                ARCH=arm64 LLVM=1 LLVM_IAS=1 \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                modules -j$(nproc)

            cp "$SRC/test_inj_steps.ko" "$OUT/inj_step_${STEP}.ko"
            echo "inj_step_${STEP}.ko: $(file $OUT/inj_step_${STEP}.ko)"
          done

          ls -la "$OUT/"

      - name: Upload test modules
        uses: actions/upload-artifact@v4
        with:
          name: step-test-modules
          path: project/output/
